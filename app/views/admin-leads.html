<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Leads - Pirabel Labs Admin</title>
<meta name="robots" content="noindex,nofollow">
<link rel="icon" type="image/png" href="/img/favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700;800&family=Inter:wght@400;500;600&family=Material+Symbols+Outlined&display=swap">
<link rel="stylesheet" href="/css/global.css">
<style>
.admin-shell { padding-top: 4rem; padding-bottom: 3rem; }
.admin-bar { position:fixed; top:0; left:0; right:0; z-index:50; background:var(--bg-2); border-bottom:1px solid var(--border); padding:.75rem var(--px-page); display:flex; justify-content:space-between; align-items:center; }
.admin-bar__brand { font-family:var(--font-display); font-weight:800; font-size:1rem; }
.admin-bar__user { font-size:.82rem; color:var(--text-muted); display:flex; align-items:center; gap:.75rem; }
.admin-bar__user button { font-size:.72rem; color:var(--accent); cursor:pointer; padding:.3rem .7rem; border:1px solid var(--accent); font-family:var(--font-display); font-weight:700; text-transform:uppercase; letter-spacing:.08em; }
.admin-bar__user button:hover { background:var(--accent-soft); }

.stat-grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(min(100%, 10rem), 1fr)); gap:.75rem; margin-bottom:1.5rem; }
.stat-box { background:var(--bg-2); border:1px solid var(--border); padding:1rem 1.25rem; }
.stat-box__val { font-family:var(--font-display); font-weight:800; font-size:1.75rem; color:var(--text); }
.stat-box__lbl { font-size:.7rem; color:var(--text-muted); text-transform:uppercase; letter-spacing:.08em; font-family:var(--font-display); font-weight:700; }
.stat-box--accent .stat-box__val { color:var(--accent); }

.filter-row { display:flex; flex-wrap:wrap; gap:.5rem; margin-bottom:1.25rem; }
.filter-pill { padding:.5rem .9rem; background:var(--bg-2); border:1px solid var(--border); color:var(--text-muted); font-family:var(--font-display); font-weight:600; font-size:.72rem; text-transform:uppercase; letter-spacing:.08em; cursor:pointer; }
.filter-pill.active { background:var(--accent); color:#fff; border-color:var(--accent); }
.filter-pill:hover { border-color:var(--accent); color:var(--accent); }
.filter-pill.active:hover { color:#fff; }

.leads-grid { display:grid; gap:.6rem; }
.lead-card { background:var(--bg-2); border:1px solid var(--border); padding:1.25rem 1.5rem; display:grid; grid-template-columns:auto 1fr auto; gap:1rem; align-items:start; }
.lead-card:hover { border-color:var(--border-2); }
.lead-card__when { font-size:.72rem; color:var(--text-faint); font-family:var(--font-display); font-weight:600; min-width:5rem; }
.lead-card__body { min-width:0; }
.lead-card__name { font-family:var(--font-display); font-weight:700; font-size:.95rem; margin-bottom:.2rem; }
.lead-card__meta { font-size:.78rem; color:var(--text-muted); margin-bottom:.5rem; }
.lead-card__meta a { color:var(--text-muted); text-decoration:none; }
.lead-card__msg { font-size:.85rem; color:var(--text-muted); line-height:1.5; max-height:3.2em; overflow:hidden; }
.lead-card__actions { display:flex; flex-direction:column; gap:.4rem; }
.lead-status { display:inline-flex; align-items:center; gap:.25rem; padding:.18rem .55rem; font-family:var(--font-display); font-weight:700; font-size:.62rem; text-transform:uppercase; letter-spacing:.08em; }
.lead-status--nouveau { background:rgba(74,222,128,.15); color:#4ade80; }
.lead-status--lu { background:var(--accent-soft); color:var(--accent); }
.lead-status--en_cours { background:rgba(251,191,36,.15); color:#fbbf24; }
.lead-status--converti { background:rgba(74,222,128,.15); color:#4ade80; }
.lead-status--perdu { background:rgba(229,226,225,.08); color:var(--text-faint); }
.lead-service { background:var(--surface); border:1px solid var(--border); padding:.18rem .55rem; font-size:.62rem; text-transform:uppercase; letter-spacing:.08em; font-family:var(--font-display); font-weight:700; color:var(--text-muted); }
.lead-link { font-size:.7rem; color:var(--accent); cursor:pointer; font-family:var(--font-display); font-weight:700; text-transform:uppercase; letter-spacing:.08em; padding:.25rem .5rem; border:1px solid transparent; }
.lead-link:hover { border-color:var(--accent); }
.lead-link--danger { color:#f87171; }
.lead-link--danger:hover { border-color:#f87171; }

@media (max-width:640px){ .lead-card { grid-template-columns: 1fr; } .lead-card__when { min-width:0; } .lead-card__actions { flex-direction:row; flex-wrap:wrap; } }

/* Modal detail */
.modal-bg { position:fixed; inset:0; background:rgba(0,0,0,.7); backdrop-filter:blur(4px); z-index:60; display:none; align-items:center; justify-content:center; padding:1rem; }
.modal-bg.open { display:flex; }
.modal { background:var(--bg); border:1px solid var(--border); padding:2rem; max-width:36rem; width:100%; max-height:90vh; overflow-y:auto; }
.modal h2 { margin-bottom:.5rem; }
.modal .field__textarea { min-height:6rem; }
.empty { padding:4rem 2rem; text-align:center; color:var(--text-muted); }
</style>
</head>
<body>
<header class="admin-bar">
  <div class="admin-bar__brand">Pirabel Labs <span style="font-weight:500;color:var(--text-muted);">/ Admin</span></div>
  <div class="admin-bar__user">
    <span id="userInfo">...</span>
    <button id="logoutBtn">Deconnexion</button>
  </div>
</header>

<main class="admin-shell">
  <div class="container">
    <h1 style="margin-bottom:1rem;">Leads</h1>
    <p class="text-muted mb-3" style="font-size:.9rem;">Toutes les demandes envoyees via le formulaire contact.</p>

    <div class="stat-grid" id="statGrid"></div>

    <div class="filter-row" id="filters">
      <button class="filter-pill active" data-status="">Tous</button>
      <button class="filter-pill" data-status="nouveau">Nouveau</button>
      <button class="filter-pill" data-status="lu">Lu</button>
      <button class="filter-pill" data-status="en_cours">En cours</button>
      <button class="filter-pill" data-status="converti">Converti</button>
      <button class="filter-pill" data-status="perdu">Perdu</button>
    </div>

    <div class="leads-grid" id="leadsGrid"><p class="empty">Chargement...</p></div>
  </div>
</main>

<div class="modal-bg" id="modalBg">
  <div class="modal">
    <h2 id="modalName">...</h2>
    <p class="text-muted" id="modalMeta" style="font-size:.85rem;margin-bottom:1.5rem;"></p>

    <div class="field">
      <label class="field__label">Message</label>
      <div id="modalMsg" style="background:var(--bg-2); border:1px solid var(--border); padding:1rem; font-size:.9rem; line-height:1.6; white-space:pre-wrap; max-height:14rem; overflow-y:auto;"></div>
    </div>

    <div class="field">
      <label class="field__label" for="modalStatus">Statut</label>
      <select id="modalStatus" class="field__select">
        <option value="nouveau">Nouveau</option>
        <option value="lu">Lu</option>
        <option value="en_cours">En cours</option>
        <option value="converti">Converti</option>
        <option value="perdu">Perdu</option>
      </select>
    </div>

    <div class="field">
      <label class="field__label" for="modalNotes">Notes internes</label>
      <textarea id="modalNotes" class="field__textarea" maxlength="5000"></textarea>
    </div>

    <div style="display:flex; gap:.75rem; flex-wrap:wrap; margin-top:1.5rem;">
      <button class="btn btn--primary" id="saveBtn">Enregistrer</button>
      <button class="btn btn--ghost" id="closeBtn">Fermer</button>
      <button class="btn btn--ghost lead-link--danger" id="deleteBtn" style="margin-left:auto;border-color:rgba(248,113,113,.3);color:#f87171;">Supprimer</button>
    </div>
  </div>
</div>

<script>
var STATE = { leads:[], current:null, filter:'' };
var qs = function(s){ return document.querySelector(s); };

function fmtDate(iso){
  var d = new Date(iso);
  var now = new Date();
  var diff = (now - d) / 1000;
  if (diff < 60) return "a l'instant";
  if (diff < 3600) return Math.floor(diff/60) + ' min';
  if (diff < 86400) return Math.floor(diff/3600) + 'h';
  if (diff < 7*86400) return Math.floor(diff/86400) + 'j';
  return d.toLocaleDateString('fr-FR', { day:'numeric', month:'short' });
}

function esc(s){ return String(s||'').replace(/[&<>"']/g, function(c){ return ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' })[c]; }); }

function loadMe(){
  fetch('/api/admin/me', { credentials:'include' })
    .then(function(r){ if(!r.ok) throw new Error('auth'); return r.json(); })
    .then(function(d){ qs('#userInfo').textContent = d.user.email; })
    .catch(function(){ window.location.href = '/pirabel-admin-7x9k2m'; });
}

function loadLeads(){
  var u = '/api/admin/leads' + (STATE.filter ? '?status=' + STATE.filter : '');
  fetch(u, { credentials:'include' })
    .then(function(r){ return r.json(); })
    .then(function(d){
      STATE.leads = d.leads || [];
      render(STATE.leads, d.stats || []);
    })
    .catch(function(){ qs('#leadsGrid').innerHTML = '<p class="empty">Erreur de chargement</p>'; });
}

function render(leads, stats){
  var counts = { nouveau:0, lu:0, en_cours:0, converti:0, perdu:0, total:0 };
  stats.forEach(function(s){ counts[s._id] = s.count; counts.total += s.count; });

  qs('#statGrid').innerHTML =
    '<div class="stat-box stat-box--accent"><div class="stat-box__val">' + counts.nouveau + '</div><div class="stat-box__lbl">Nouveaux</div></div>' +
    '<div class="stat-box"><div class="stat-box__val">' + counts.lu + '</div><div class="stat-box__lbl">Lus</div></div>' +
    '<div class="stat-box"><div class="stat-box__val">' + counts.en_cours + '</div><div class="stat-box__lbl">En cours</div></div>' +
    '<div class="stat-box"><div class="stat-box__val">' + counts.converti + '</div><div class="stat-box__lbl">Convertis</div></div>' +
    '<div class="stat-box"><div class="stat-box__val">' + counts.total + '</div><div class="stat-box__lbl">Total</div></div>';

  if (!leads.length) {
    qs('#leadsGrid').innerHTML = '<p class="empty">Aucun lead pour le moment.</p>';
    return;
  }
  qs('#leadsGrid').innerHTML = leads.map(function(l){
    var msgPreview = (l.message || '').slice(0, 220);
    return '<div class="lead-card">' +
      '<div class="lead-card__when">' + fmtDate(l.createdAt) + '</div>' +
      '<div class="lead-card__body">' +
        '<div class="lead-card__name">' + esc(l.name) + '</div>' +
        '<div class="lead-card__meta">' +
          '<a href="mailto:' + esc(l.email) + '">' + esc(l.email) + '</a>' +
          (l.phone ? ' &middot; ' + esc(l.phone) : '') +
          (l.company ? ' &middot; ' + esc(l.company) : '') +
        '</div>' +
        '<div class="lead-card__msg">' + esc(msgPreview) + (l.message.length > 220 ? '...' : '') + '</div>' +
      '</div>' +
      '<div class="lead-card__actions">' +
        '<span class="lead-status lead-status--' + l.status + '">' + l.status.replace('_',' ') + '</span>' +
        '<span class="lead-service">' + esc(l.service) + '</span>' +
        '<a class="lead-link" data-id="' + l._id + '">Ouvrir</a>' +
      '</div>' +
    '</div>';
  }).join('');
  Array.prototype.forEach.call(document.querySelectorAll('.lead-link[data-id]'), function(el){
    el.addEventListener('click', function(){ openModal(el.dataset.id); });
  });
}

function openModal(id){
  var l = STATE.leads.find(function(x){ return x._id === id; });
  if (!l) return;
  STATE.current = l;
  qs('#modalName').textContent = l.name;
  qs('#modalMeta').innerHTML = '<a href="mailto:' + esc(l.email) + '">' + esc(l.email) + '</a>' + (l.phone ? ' &middot; ' + esc(l.phone) : '') + (l.company ? ' &middot; ' + esc(l.company) : '') + '<br>Service : <strong>' + esc(l.service) + '</strong> &middot; Recu ' + new Date(l.createdAt).toLocaleString('fr-FR');
  qs('#modalMsg').textContent = l.message;
  qs('#modalStatus').value = l.status;
  qs('#modalNotes').value = l.internalNotes || '';
  qs('#modalBg').classList.add('open');
}
function closeModal(){ qs('#modalBg').classList.remove('open'); STATE.current = null; }

qs('#closeBtn').addEventListener('click', closeModal);
qs('#modalBg').addEventListener('click', function(e){ if (e.target.id === 'modalBg') closeModal(); });

qs('#saveBtn').addEventListener('click', function(){
  if (!STATE.current) return;
  var btn = this; btn.disabled = true; btn.textContent = 'Sauvegarde...';
  fetch('/api/admin/leads/' + STATE.current._id, {
    method: 'PATCH',
    headers: {'Content-Type':'application/json'},
    credentials: 'include',
    body: JSON.stringify({ status: qs('#modalStatus').value, internalNotes: qs('#modalNotes').value })
  })
  .then(function(r){ return r.json(); })
  .then(function(){
    btn.disabled = false; btn.textContent = 'Enregistrer';
    closeModal();
    loadLeads();
  });
});

qs('#deleteBtn').addEventListener('click', function(){
  if (!STATE.current) return;
  if (!confirm('Supprimer definitivement ce lead ?')) return;
  fetch('/api/admin/leads/' + STATE.current._id, { method: 'DELETE', credentials: 'include' })
    .then(function(){ closeModal(); loadLeads(); });
});

qs('#logoutBtn').addEventListener('click', function(){
  fetch('/api/admin/logout', { method: 'POST', credentials: 'include' })
    .then(function(){ window.location.href = '/pirabel-admin-7x9k2m'; });
});

Array.prototype.forEach.call(document.querySelectorAll('#filters .filter-pill'), function(el){
  el.addEventListener('click', function(){
    Array.prototype.forEach.call(document.querySelectorAll('#filters .filter-pill'), function(x){ x.classList.remove('active'); });
    el.classList.add('active');
    STATE.filter = el.dataset.status;
    loadLeads();
  });
});

loadMe();
loadLeads();
setInterval(loadLeads, 30000);
</script>
</body>
</html>
