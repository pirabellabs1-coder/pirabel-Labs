<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calendrier — Pirabel Labs Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/dashboard.css">
<style>
.admin-layout{display:flex;min-height:100vh;background:var(--surface);}
.main-content{flex:1;padding:2rem;overflow-y:auto;}
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:2rem;}
h1{font-family:var(--font-headline);font-size:1.75rem;font-weight:700;}
.calendar-grid{background:var(--surface-container);border:1px solid var(--outline-variant);display:grid;grid-template-columns:repeat(7,1fr);min-height:600px;box-shadow:var(--shadow-m);}
.cal-h{padding:1rem;text-align:center;border-bottom:1px solid var(--outline-variant);font-size:.7rem;text-transform:uppercase;letter-spacing:1px;color:var(--on-surface-variant);font-weight:700;}
.cal-d{border-right:1px solid var(--outline-variant);border-bottom:1px solid var(--outline-variant);padding:.75rem;min-height:120px;transition:background .2s;position:relative;}
.cal-d:nth-child(7n){border-right:none;}
.cal-d:hover{background:rgba(255,85,0,0.03);}
.cal-d.today{background:rgba(255,85,0,0.08);}
.cal-d.other-month{opacity:0.3;pointer-events:none;}
.day-num{font-size:.85rem;font-weight:700;margin-bottom:.75rem;display:block;}
.appt-list{display:flex;flex-direction:column;gap:4px;}
.appt-item{background:var(--primary);color:#5c1900;padding:4px 8px;font-size:10px;font-weight:700;border-radius:2px;cursor:grab;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:flex;align-items:center;gap:4px;}
.appt-item:active{cursor:grabbing;}
.appt-item:hover{filter:brightness(1.1);}
.appt-item.type-consultation{border-left:3px solid #6c5ce7;}
.appt-item.type-kickoff{border-left:3px solid #00b894;}
.modal{position:fixed;inset:0;background:rgba(0,0,0,0.8);display:none;align-items:center;justify-content:center;z-index:1000;}
.modal-content{background:var(--surface-container);border:1px solid var(--outline-variant);padding:2rem;width:400px;max-width:90vw;}
.field{margin-bottom:1.25rem;}
.field label{display:block;font-size:.7rem;text-transform:uppercase;letter-spacing:1px;color:var(--on-surface-variant);margin-bottom:.5rem;font-weight:700;}
.field input, .field select, .field textarea{width:100%;background:var(--surface);border:1px solid var(--outline-variant);padding:.75rem;color:var(--on-surface);font-size:.9rem;outline:none;}
.field textarea{min-height:80px;resize:vertical;}
.btn-save{background:var(--primary);color:#5c1900;border:none;padding:1rem;font-weight:700;width:100%;cursor:pointer;text-transform:uppercase;letter-spacing:1px;font-family:inherit;}
.drop-over{background:rgba(255,85,0,0.1) !important;}
</style>
</head>
<body>
<div class="admin-layout">
  <div id="sidebar-target"></div>
  <main class="main-content">
    <header class="header">
      <h1 id="month-title">Chargement...</h1>
      <div style="display:flex;gap:1rem;">
        <div style="display:flex;border:1px solid var(--outline-variant);">
          <button onclick="prevMonth()" style="padding:.5rem;background:transparent;border:none;color:var(--on-surface);cursor:pointer;"><span class="material-symbols-outlined">chevron_left</span></button>
          <button onclick="nextMonth()" style="padding:.5rem;background:transparent;border:none;color:var(--on-surface);cursor:pointer;"><span class="material-symbols-outlined">chevron_right</span></button>
        </div>
        <button class="btn-save" style="width:auto;padding:0.75rem 1.5rem;" onclick="openModal()">+ Nouveau RDV</button>
      </div>
    </header>
    <div class="calendar-grid" id="calendar-grid"></div>
  </main>
</div>
<div class="modal" id="modal">
  <div class="modal-content">
    <h2 style="margin-bottom:1.5rem;font-family:var(--font-headline);">Modifier le RDV</h2>
    <form id="appt-form" onsubmit="saveAppointment(event)">
      <div class="field"><label>Titre</label><input type="text" name="title" required id="f-title"></div>
      <div class="field"><label>Type</label><select name="type" id="f-type"><option value="consultation">Consultation découverte</option><option value="kickoff">Kick-off projet</option><option value="review">Review technique</option><option value="autre">Autre</option></select></div>
      <div class="field"><label>Date & Heure</label><input type="datetime-local" name="date" required id="f-date"></div>
      <div class="field"><label>Notes</label><textarea name="notes" id="f-notes"></textarea></div>
      <button type="submit" class="btn-save">Enregistrer</button>
      <button type="button" class="btn-save" style="background:transparent;color:var(--on-surface-variant);margin-top:0.5rem;" onclick="closeModal()">Annuler</button>
    </form>
  </div>
</div>
<script src="/js/sidebar.js"></script>
<script>
let currentMonth = new Date();
let appointments = [];
let draggingId = null;

async function loadAppointments() {
  try {
    const r = await fetch('/api/appointments');
    const data = await r.json();
    appointments = data.appointments || [];
    renderCalendar();
  } catch (err) { console.error(err); }
}

function renderCalendar() {
  const grid = document.getElementById('calendar-grid');
  const title = document.getElementById('month-title');
  title.textContent = currentMonth.toLocaleDateString('fr-FR', { month: 'long', year: 'numeric' });
  grid.innerHTML = '';
  const days = ['Lun', 'Mar', 'Mer', 'Jeu', 'Ven', 'Sam', 'Dim'];
  days.forEach(d => grid.innerHTML += `<div class="cal-h">${d}</div>`);
  const firstDay = new Date(currentMonth.getFullYear(), currentMonth.getMonth(), 1);
  const lastDay = new Date(currentMonth.getFullYear(), currentMonth.getMonth() + 1, 0);
  let startOffset = firstDay.getDay() - 1;
  if (startOffset < 0) startOffset = 6;
  for (let i = 0; i < startOffset; i++) {
    const d = new Date(firstDay); d.setDate(d.getDate() - (startOffset - i));
    grid.innerHTML += `<div class="cal-d other-month"><span class="day-num">${d.getDate()}</span></div>`;
  }
  const today = new Date();
  for (let i = 1; i <= lastDay.getDate(); i++) {
    const d = new Date(currentMonth.getFullYear(), currentMonth.getMonth(), i);
    const dateStr = d.toISOString().split('T')[0];
    const isToday = d.toDateString() === today.toDateString();
    const dayAppts = appointments.filter(a => new Date(a.date).toDateString() === d.toDateString());
    
    let apptsHtml = dayAppts.map(a => `
      <div class="appt-item type-${a.type}" 
           draggable="true" 
           ondragstart="handleDragStart(event, '${a._id}')"
           title="${a.title}">
        ${new Date(a.date).getHours()}:${new Date(a.date).getMinutes().toString().padStart(2,'0')} ${a.title}
      </div>`).join('');

    grid.innerHTML += `
      <div class="cal-d ${isToday ? 'today' : ''}" 
           id="day-${dateStr}"
           ondragover="handleDragOver(event)" 
           onpadding="handleDragLeave(event)"
           ondrop="handleDrop(event, '${dateStr}')">
        <span class="day-num">${i}</span>
        <div class="appt-list">${apptsHtml}</div>
      </div>`;
  }
}

// Drag & Drop Handlers
function handleDragStart(e, id) {
  draggingId = id;
  e.dataTransfer.setData('text/plain', id);
  e.target.style.opacity = '0.5';
}

function handleDragOver(e) {
  e.preventDefault();
  e.currentTarget.classList.add('drop-over');
}

function handleDragLeave(e) {
  e.currentTarget.classList.remove('drop-over');
}

async function handleDrop(e, dateStr) {
  e.preventDefault();
  const id = draggingId;
  const targetDay = e.currentTarget;
  targetDay.classList.remove('drop-over');
  
  const appt = appointments.find(a => a._id === id);
  if (!appt) return;

  const oldDate = new Date(appt.date);
  const newDate = new Date(dateStr);
  newDate.setHours(oldDate.getHours(), oldDate.getMinutes());

  if (!confirm(`Déplacer "${appt.title}" au ${newDate.toLocaleDateString()} ?`)) return;

  try {
    const r = await fetch(`/api/appointments/${id}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ 
        date: newDate.toISOString(),
        rescheduleReason: 'Déplacement manuel via calendrier admin' 
      })
    });
    if (r.ok) {
      loadAppointments();
    } else {
      alert('Erreur lors de la mise à jour');
    }
  } catch (err) {
    alert('Erreur réseau');
  }
}

function prevMonth() { currentMonth.setMonth(currentMonth.getMonth() - 1); renderCalendar(); }
function nextMonth() { currentMonth.setMonth(currentMonth.getMonth() + 1); renderCalendar(); }
function openModal() { document.getElementById('modal').style.display = 'flex'; }
function closeModal() { document.getElementById('modal').style.display = 'none'; }

async function saveAppointment(e) {
  e.preventDefault();
  const formData = new FormData(e.target);
  const data = Object.fromEntries(formData);
  try {
    const r = await fetch('/api/appointments', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data)
    });
    if (r.ok) { loadAppointments(); closeModal(); e.target.reset(); }
  } catch (err) { alert('Erreur'); }
}

loadAppointments();
</script>
</body>
</html>
