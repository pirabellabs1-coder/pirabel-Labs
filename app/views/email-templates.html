<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Templates Email | Pirabel Labs Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/dashboard.css">
<script src="/js/dashboard-ui.js" defer></script>
<script src="/js/sidebar.js"></script>
<script src="/js/admin-topbar.js" defer></script>
<style>
.tpl-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:1rem;}
.tpl-card{background:var(--card);border:1px solid var(--border);padding:1.25rem;cursor:pointer;transition:border-color .3s;}
.tpl-card:hover{border-color:var(--accent);}
.tpl-cat{display:inline-block;background:rgba(255,85,0,.1);color:var(--accent);padding:.2rem .6rem;font-size:.6rem;text-transform:uppercase;letter-spacing:.08em;font-weight:700;margin-bottom:.75rem;}
.tpl-name{font-weight:700;font-size:.95rem;margin-bottom:.25rem;}
.tpl-subject{font-size:.8rem;color:var(--muted);margin-bottom:.5rem;}
.tpl-usage{font-size:.7rem;color:var(--muted);}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);display:none;align-items:center;justify-content:center;z-index:1000;padding:1rem;}
.modal-bg.show{display:flex;}
.modal{background:var(--card);border:1px solid var(--border);max-width:650px;width:100%;max-height:90vh;overflow-y:auto;}
.modal-header{padding:1.25rem 1.5rem;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
.modal-body{padding:1.5rem;}
.field{margin-bottom:1rem;}
.field label{display:block;font-size:.7rem;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:.4rem;font-weight:700;}
.field input,.field textarea,.field select{width:100%;background:var(--bg);border:1px solid var(--border);padding:.7rem 1rem;color:var(--text);font-size:.85rem;outline:none;font-family:inherit;}
.btn-primary{background:var(--accent);color:#5c1900;border:none;padding:.75rem 1.5rem;font-weight:700;font-size:.8rem;text-transform:uppercase;cursor:pointer;}
.btn-secondary{background:transparent;color:var(--text);border:1px solid var(--border);padding:.75rem 1.5rem;font-size:.8rem;cursor:pointer;}
.btn-danger{background:transparent;color:#e74c3c;border:1px solid rgba(231,76,60,.3);padding:.75rem 1rem;font-size:.8rem;cursor:pointer;}
.var-tag{display:inline-block;background:rgba(255,85,0,.08);color:var(--accent);padding:.15rem .4rem;font-size:.65rem;font-family:monospace;margin:.1rem;cursor:pointer;}
</style>
</head>
<body>
<div class="toast-container" id="toasts"></div>
<div class="app">
<aside class="sidebar" id="sidebar"><div class="sidebar-logo">PIRABEL LABS</div><nav class="sidebar-nav" id="sidebar-nav"></nav></aside>
<div class="main">
  <header class="topbar">
    <div style="display:flex;align-items:center;gap:1rem;">
      <button class="hamburger-dash" onclick="document.getElementById('sidebar').classList.toggle('open')"><span class="material-symbols-outlined">menu</span></button>
      <div class="topbar-title">Templates Email</div>
    </div>
    <div class="topbar-actions">
      <button class="btn-primary" onclick="openCreate()"><span class="material-symbols-outlined" style="font-size:1rem;vertical-align:middle;">add</span> Nouveau template</button>
    </div>
  </header>
  <div class="content">
    <div style="margin-bottom:1rem;">
      <select id="filter-cat" onchange="load()" style="background:var(--bg);border:1px solid var(--border);color:var(--text);padding:.5rem;font-size:.8rem;">
        <option value="">Toutes les catégories</option>
        <option value="welcome">Welcome</option><option value="relance">Relance</option><option value="devis">Devis</option><option value="refus">Refus</option><option value="suivi">Suivi</option><option value="rappel">Rappel</option><option value="autre">Autre</option>
      </select>
    </div>
    <div class="tpl-grid" id="list"></div>
  </div>
</div>
</div>
<div class="modal-bg" id="modal"><div class="modal">
  <div class="modal-header">
    <h3 id="modal-title" style="margin:0;font-family:var(--font-h);">Template</h3>
    <button onclick="closeModal()" style="background:none;border:none;color:var(--muted);font-size:1.5rem;cursor:pointer;">×</button>
  </div>
  <div class="modal-body">
    <div style="display:grid;grid-template-columns:2fr 1fr;gap:1rem;">
      <div class="field"><label>Nom *</label><input id="f-name" placeholder="Bienvenue nouveau client"></div>
      <div class="field"><label>Catégorie</label><select id="f-category"><option value="welcome">Welcome</option><option value="relance">Relance</option><option value="devis">Devis</option><option value="refus">Refus</option><option value="suivi">Suivi</option><option value="rappel">Rappel</option><option value="autre">Autre</option></select></div>
    </div>
    <div class="field"><label>Objet email *</label><input id="f-subject" placeholder="Bienvenue chez Pirabel Labs !"></div>
    <div class="field">
      <label>Corps du message * <span style="font-weight:400;font-size:.6rem;color:var(--muted);">Variables disponibles :</span></label>
      <div style="margin-bottom:.5rem;">
        <span class="var-tag" onclick="insertVar('{{name}}')">{{name}}</span>
        <span class="var-tag" onclick="insertVar('{{company}}')">{{company}}</span>
        <span class="var-tag" onclick="insertVar('{{project}}')">{{project}}</span>
        <span class="var-tag" onclick="insertVar('{{amount}}')">{{amount}}</span>
        <span class="var-tag" onclick="insertVar('{{date}}')">{{date}}</span>
        <span class="var-tag" onclick="insertVar('{{link}}')">{{link}}</span>
      </div>
      <textarea id="f-body" rows="10" placeholder="Bonjour {{name}},&#10;&#10;Bienvenue chez Pirabel Labs..."></textarea>
    </div>
    <div style="display:flex;gap:.75rem;justify-content:flex-end;margin-top:1rem;">
      <button class="btn-danger" id="del-btn" style="margin-right:auto;display:none;" onclick="del()">Supprimer</button>
      <button class="btn-secondary" onclick="closeModal()">Annuler</button>
      <button class="btn-primary" onclick="save()">Enregistrer</button>
    </div>
  </div>
</div></div>
<script>
const token=localStorage.getItem('token');if(!token)window.location.href='/pirabel-admin-7x9k2m';
const headers={'Authorization':'Bearer '+token,'Content-Type':'application/json'};
let all=[],editingId=null;

document.getElementById('sidebar-nav').innerHTML=`
<div class="sidebar-section">Principal</div><a href="/dashboard" class="sidebar-link"><span class="material-symbols-outlined">dashboard</span> Dashboard</a><a href="/orders" class="sidebar-link"><span class="material-symbols-outlined">inbox</span> Demandes</a><a href="/calendar" class="sidebar-link"><span class="material-symbols-outlined">event</span> Calendrier</a><a href="/tasks" class="sidebar-link"><span class="material-symbols-outlined">task_alt</span> Tâches</a>
<div class="sidebar-section">Commercial</div><a href="/quotes" class="sidebar-link"><span class="material-symbols-outlined">description</span> Devis</a><a href="/pipeline" class="sidebar-link"><span class="material-symbols-outlined">view_kanban</span> Pipeline CRM</a><a href="/email-templates" class="sidebar-link active"><span class="material-symbols-outlined">mail</span> Templates Email</a>
<div class="sidebar-section">Gestion</div><a href="/clients" class="sidebar-link"><span class="material-symbols-outlined">people</span> Clients</a><a href="/projects" class="sidebar-link"><span class="material-symbols-outlined">folder</span> Projets</a><a href="/employees" class="sidebar-link"><span class="material-symbols-outlined">badge</span> Employés</a><a href="/time-tracking" class="sidebar-link"><span class="material-symbols-outlined">timer</span> Time Tracking</a><a href="/recruitment" class="sidebar-link"><span class="material-symbols-outlined">work</span> Recrutement</a>
<div class="sidebar-section">Marketing</div><a href="/campaigns" class="sidebar-link"><span class="material-symbols-outlined">campaign</span> Campagnes</a><a href="/leads" class="sidebar-link"><span class="material-symbols-outlined">group_add</span> Leads</a><a href="/analytics" class="sidebar-link"><span class="material-symbols-outlined">analytics</span> Analytics</a><a href="/reviews-admin" class="sidebar-link"><span class="material-symbols-outlined">star</span> Avis</a>
<div class="sidebar-section">Finance</div><a href="/invoices" class="sidebar-link"><span class="material-symbols-outlined">receipt_long</span> Factures</a><a href="/revenue" class="sidebar-link"><span class="material-symbols-outlined">monitoring</span> Revenue</a>
<div class="sidebar-section">Système</div><a href="/settings" class="sidebar-link"><span class="material-symbols-outlined">settings</span> Paramètres</a>`;

function toast(m,t='success'){const e=document.createElement('div');e.className='toast toast-'+t;e.textContent=m;document.getElementById('toasts').appendChild(e);setTimeout(()=>e.remove(),3000);}
function esc(s){return(s||'').replace(/</g,'&lt;');}
function insertVar(v){const el=document.getElementById('f-body');el.focus();document.execCommand('insertText',false,v);}

async function load(){
  const cat=document.getElementById('filter-cat').value;
  const r=await fetch('/api/email-templates'+(cat?'?category='+cat:''),{headers});
  const d=await r.json();all=d.templates||[];
  document.getElementById('list').innerHTML=all.length?all.map(t=>`
    <div class="tpl-card" onclick="openEdit('${t._id}')">
      <div class="tpl-cat">${t.category}</div>
      <div class="tpl-name">${esc(t.name)}</div>
      <div class="tpl-subject">${esc(t.subject)}</div>
      <div class="tpl-usage">Utilisé ${t.usageCount||0} fois</div>
    </div>
  `).join(''):'<div style="grid-column:1/-1;text-align:center;color:var(--muted);padding:3rem;">Aucun template. Créez-en un !</div>';
}

function openCreate(){editingId=null;document.getElementById('modal-title').textContent='Nouveau template';document.getElementById('del-btn').style.display='none';['f-name','f-subject','f-body'].forEach(id=>document.getElementById(id).value='');document.getElementById('f-category').value='autre';document.getElementById('modal').classList.add('show');}
function openEdit(id){const t=all.find(x=>x._id===id);if(!t)return;editingId=id;document.getElementById('modal-title').textContent='Modifier: '+t.name;document.getElementById('del-btn').style.display='inline-block';document.getElementById('f-name').value=t.name;document.getElementById('f-subject').value=t.subject;document.getElementById('f-body').value=t.body;document.getElementById('f-category').value=t.category;document.getElementById('modal').classList.add('show');}
function closeModal(){document.getElementById('modal').classList.remove('show');}

async function save(){
  const body={name:document.getElementById('f-name').value.trim(),subject:document.getElementById('f-subject').value.trim(),body:document.getElementById('f-body').value.trim(),category:document.getElementById('f-category').value};
  if(!body.name||!body.subject||!body.body)return toast('Champs requis','error');
  await fetch(editingId?'/api/email-templates/'+editingId:'/api/email-templates',{method:editingId?'PUT':'POST',headers,body:JSON.stringify(body)});
  toast('Sauvegardé');closeModal();load();
}
async function del(){if(!editingId||!confirm('Supprimer ?'))return;await fetch('/api/email-templates/'+editingId,{method:'DELETE',headers});toast('Supprimé');closeModal();load();}

load();
</script>
</body>
</html>
