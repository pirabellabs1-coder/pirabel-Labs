<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pipeline CRM | Pirabel Labs Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/dashboard.css">
<script src="/js/dashboard-ui.js" defer></script>
<script src="/js/sidebar.js"></script>
<script src="/js/admin-topbar.js" defer></script>
<style>
.pipeline-stats{display:flex;gap:1rem;margin-bottom:1.5rem;flex-wrap:wrap;}
.pipeline-stat{background:var(--card);border:1px solid var(--border);padding:1.25rem 1.5rem;flex:1;min-width:140px;position:relative;overflow:hidden;}
.pipeline-stat::after{content:'';position:absolute;top:0;left:0;right:0;height:3px;}
.pipeline-stat:nth-child(1)::after{background:linear-gradient(90deg,#3498db,#2980b9);}
.pipeline-stat:nth-child(2)::after{background:linear-gradient(90deg,#f39c12,#e67e22);}
.pipeline-stat:nth-child(3)::after{background:linear-gradient(90deg,#2ecc71,#27ae60);}
.pipeline-stat:nth-child(4)::after{background:linear-gradient(90deg,#FF5500,#e64d00);}
.pipeline-stat .label{font-size:.65rem;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);font-weight:700;}
.pipeline-stat .value{font-family:var(--font-h);font-weight:700;font-size:1.5rem;margin-top:.25rem;}
.kanban{display:grid;grid-template-columns:repeat(6,1fr);gap:0.75rem;min-height:500px;}
@media(max-width:1200px){.kanban{grid-template-columns:repeat(3,1fr);}}
@media(max-width:768px){.kanban{grid-template-columns:1fr 1fr;}}
.kanban-col{background:rgba(20,20,20,0.5);border:1px solid var(--border);display:flex;flex-direction:column;}
.kanban-header{padding:.75rem 1rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.kanban-title{font-family:var(--font-h);font-weight:700;font-size:.75rem;text-transform:uppercase;letter-spacing:.05em;display:flex;align-items:center;gap:.5rem;}
.kanban-title .material-symbols-outlined{font-size:1rem;opacity:.7;}
.kanban-count{background:rgba(255,255,255,0.05);padding:.15rem .5rem;font-size:.65rem;font-weight:700;color:var(--muted);}
.kanban-cards{padding:.5rem;flex:1;min-height:200px;transition:background 0.2s;}
.kanban-cards.drag-over{background:rgba(255,85,0,.08);border:2px dashed var(--accent);}
.kanban-cards:empty::after{content:'Glissez un deal ici';display:flex;justify-content:center;align-items:center;height:100%;font-size:.75rem;color:var(--muted2);opacity:.5;font-style:italic;}
.deal-card{background:var(--card);border:1px solid var(--border);padding:.875rem;margin-bottom:.5rem;cursor:grab;transition:all .2s ease;position:relative;}
.deal-card:hover{border-color:rgba(255,85,0,.4);transform:translateY(-2px);box-shadow:0 6px 16px rgba(0,0,0,.35);}
.deal-card.dragging{opacity:.5;transform:rotate(2deg);}
.deal-name{font-weight:600;font-size:.85rem;margin-bottom:.25rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.deal-company{font-size:.7rem;color:var(--muted);margin-bottom:.5rem;display:flex;align-items:center;gap:.25rem;}
.deal-value{font-family:var(--font-h);font-weight:700;font-size:.9rem;color:var(--accent);}
.deal-prob{font-size:.6rem;color:var(--muted);margin-left:.5rem;background:rgba(255,255,255,0.05);padding:.1rem .4rem;}
.stage-lead .kanban-header{border-top:3px solid #3498db;}
.stage-contacte .kanban-header{border-top:3px solid #f39c12;}
.stage-devis .kanban-header{border-top:3px solid #9b59b6;}
.stage-negociation .kanban-header{border-top:3px solid #e67e22;}
.stage-gagne .kanban-header{border-top:3px solid #2ecc71;background:rgba(46,204,113,.05);}
.stage-perdu .kanban-header{border-top:3px solid #e74c3c;background:rgba(231,76,60,.05);}
.stage-lead .kanban-title .material-symbols-outlined{color:#3498db;}
.stage-contacte .kanban-title .material-symbols-outlined{color:#f39c12;}
.stage-devis .kanban-title .material-symbols-outlined{color:#9b59b6;}
.stage-negociation .kanban-title .material-symbols-outlined{color:#e67e22;}
.stage-gagne .kanban-title .material-symbols-outlined{color:#2ecc71;}
.stage-perdu .kanban-title .material-symbols-outlined{color:#e74c3c;}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);display:none;align-items:center;justify-content:center;z-index:1000;padding:1rem;}
.modal-bg.show{display:flex;}
.modal{background:var(--card);border:1px solid var(--border);max-width:560px;width:100%;max-height:90vh;overflow-y:auto;}
.modal-header{padding:1.25rem 1.5rem;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
.modal-body{padding:1.5rem;}
.field{margin-bottom:1rem;}
.field label{display:block;font-size:.7rem;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:.4rem;font-weight:700;}
.field input,.field textarea,.field select{width:100%;background:var(--bg);border:1px solid var(--border);padding:.7rem 1rem;color:var(--text);font-size:.85rem;outline:none;transition:border-color .2s;}
.field input:focus,.field textarea:focus,.field select:focus{border-color:rgba(255,85,0,.4);}
.btn-primary{background:var(--accent);color:#fff;border:none;padding:.75rem 1.5rem;font-weight:700;font-size:.8rem;text-transform:uppercase;cursor:pointer;transition:background .2s;}
.btn-primary:hover{background:#e64d00;}
.btn-secondary{background:transparent;color:var(--text);border:1px solid var(--border);padding:.75rem 1.5rem;font-size:.8rem;cursor:pointer;transition:border-color .2s;}
.btn-secondary:hover{border-color:var(--muted);}
.btn-danger{background:transparent;color:#e74c3c;border:1px solid rgba(231,76,60,.3);padding:.75rem 1rem;font-size:.8rem;cursor:pointer;}
.btn-danger:hover{background:rgba(231,76,60,.1);}
</style>
</head>
<body>
<div class="toast-container" id="toasts"></div>
<div class="app">
<aside class="sidebar" id="sidebar">
  <div class="sidebar-logo">PIRABEL LABS</div>
  <nav class="sidebar-nav" id="sidebar-nav"></nav>
</aside>

<div class="main">
  <header class="topbar">
    <div style="display:flex;align-items:center;gap:1rem;">
      <button class="hamburger-dash" onclick="document.getElementById('sidebar').classList.toggle('open')"><span class="material-symbols-outlined">menu</span></button>
      <div class="topbar-title">Pipeline Commercial</div>
    </div>
    <div class="topbar-actions">
      <button class="btn-primary" onclick="openCreateDeal()"><span class="material-symbols-outlined" style="font-size:1rem;vertical-align:middle;">add</span> Nouveau deal</button>
    </div>
  </header>

  <div class="content">
    <div class="pipeline-stats">
      <div class="pipeline-stat"><div class="label">Valeur pipeline</div><div class="value" id="s-total">0 €</div></div>
      <div class="pipeline-stat"><div class="label">Pondéré</div><div class="value" id="s-weighted">0 €</div></div>
      <div class="pipeline-stat"><div class="label">Gagné</div><div class="value" style="color:#2ecc71;" id="s-won">0 €</div></div>
      <div class="pipeline-stat"><div class="label">Deals actifs</div><div class="value" id="s-count">0</div></div>
    </div>

    <div class="kanban" id="kanban"></div>
  </div>
</div>
</div>

<div class="modal-bg" id="modal"><div class="modal">
  <div class="modal-header">
    <h3 id="modal-title" style="margin:0;font-family:var(--font-h);">Nouveau deal</h3>
    <button onclick="closeModal()" style="background:none;border:none;color:var(--muted);font-size:1.5rem;cursor:pointer;">×</button>
  </div>
  <div class="modal-body">
    <div class="field"><label>Titre *</label><input id="f-title" placeholder="Projet SEO Entreprise X"></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;">
      <div class="field"><label>Contact</label><input id="f-contactName"></div>
      <div class="field"><label>Email</label><input id="f-contactEmail" type="email"></div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;">
      <div class="field"><label>Entreprise</label><input id="f-contactCompany"></div>
      <div class="field"><label>Téléphone</label><input id="f-contactPhone"></div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:1rem;">
      <div class="field"><label>Valeur (€)</label><input id="f-value" type="number" value="0"></div>
      <div class="field"><label>Stade</label>
        <select id="f-stage"><option value="lead">Lead</option><option value="contacte">Contacté</option><option value="devis">Devis</option><option value="negociation">Négociation</option><option value="gagne">Gagné</option><option value="perdu">Perdu</option></select>
      </div>
      <div class="field"><label>Service</label><input id="f-service" placeholder="SEO, Web..."></div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;">
      <div class="field"><label>Source</label><input id="f-source" placeholder="Site, Recommandation..."></div>
      <div class="field"><label>Date clôture prévue</label><input id="f-closeDate" type="date"></div>
    </div>
    <div class="field"><label>Notes</label><textarea id="f-notes" rows="2"></textarea></div>
    <div style="display:flex;gap:.75rem;justify-content:flex-end;margin-top:1rem;">
      <button class="btn-danger" id="del-btn" style="margin-right:auto;display:none;" onclick="deleteDeal()">Supprimer</button>
      <button class="btn-secondary" onclick="closeModal()">Annuler</button>
      <button class="btn-primary" onclick="saveDeal()">Enregistrer</button>
    </div>
  </div>
</div></div>

<script>
const token = localStorage.getItem('token');
if (!token) window.location.href = '/pirabel-admin-7x9k2m';
const headers = { 'Authorization': 'Bearer ' + token, 'Contenu-Type': 'application/json' };
let allDeals = [];
let editingId = null;
let draggedDealId = null;

document.getElementById('sidebar-nav').innerHTML = `
<div class="sidebar-section">Principal</div>
<a href="/dashboard" class="sidebar-link"><span class="material-symbols-outlined">dashboard</span> Dashboard</a>
<a href="/orders" class="sidebar-link"><span class="material-symbols-outlined">inbox</span> Demandes</a>
<a href="/calendar" class="sidebar-link"><span class="material-symbols-outlined">event</span> Calendrier</a>
<a href="/tasks" class="sidebar-link"><span class="material-symbols-outlined">task_alt</span> Tâches</a>
<div class="sidebar-section">Commercial</div>
<a href="/quotes" class="sidebar-link"><span class="material-symbols-outlined">description</span> Devis</a>
<a href="/pipeline" class="sidebar-link active"><span class="material-symbols-outlined">view_kanban</span> Pipeline CRM</a>
<a href="/email-templates" class="sidebar-link"><span class="material-symbols-outlined">mail</span> Templates Email</a>
<div class="sidebar-section">Gestion</div>
<a href="/clients" class="sidebar-link"><span class="material-symbols-outlined">people</span> Clients</a>
<a href="/projects" class="sidebar-link"><span class="material-symbols-outlined">folder</span> Projets</a>
<a href="/employees" class="sidebar-link"><span class="material-symbols-outlined">badge</span> Employés</a>
<a href="/time-tracking" class="sidebar-link"><span class="material-symbols-outlined">timer</span> Time Tracking</a>
<a href="/recruitment" class="sidebar-link"><span class="material-symbols-outlined">work</span> Recrutement</a>
<div class="sidebar-section">Marketing</div>
<a href="/campaigns" class="sidebar-link"><span class="material-symbols-outlined">campaign</span> Campagnes</a>
<a href="/leads" class="sidebar-link"><span class="material-symbols-outlined">group_add</span> Leads</a>
<a href="/analytics" class="sidebar-link"><span class="material-symbols-outlined">analytics</span> Analytics</a>
<a href="/reviews-admin" class="sidebar-link"><span class="material-symbols-outlined">star</span> Avis clients</a>
<div class="sidebar-section">Finance</div>
<a href="/invoices" class="sidebar-link"><span class="material-symbols-outlined">receipt_long</span> Factures</a>
<a href="/revenue" class="sidebar-link"><span class="material-symbols-outlined">monitoring</span> Revenue</a>
<div class="sidebar-section">Système</div>
<a href="/settings" class="sidebar-link"><span class="material-symbols-outlined">settings</span> Paramètres</a>
`;

const stages = [
  { key: 'lead', label: 'Lead', icon: 'person_add' },
  { key: 'contacte', label: 'Contacté', icon: 'phone' },
  { key: 'devis', label: 'Devis', icon: 'description' },
  { key: 'negociation', label: 'Négociation', icon: 'handshake' },
  { key: 'gagne', label: 'Gagné', icon: 'emoji_events' },
  { key: 'perdu', label: 'Perdu', icon: 'block' }
];

function toast(msg,type='success'){const t=document.createElement('div');t.className='toast toast-'+type;t.textContent=msg;document.getElementById('toasts').appendChild(t);setTimeout(()=>t.remove(),3000);}
function fmt(n){return(n||0).toLocaleString('fr-FR')+' €';}
function esc(s){return(s||'').replace(/</g,'&lt;');}

async function loadPipeline(){
  const res = await fetch('/api/deals', { headers });
  const data = await res.json();
  allDeals = data.deals || [];

  document.getElementById('s-total').textContent = fmt(data.stats?.totalValue);
  document.getElementById('s-weighted').textContent = fmt(data.stats?.weightedValue);
  document.getElementById('s-won').textContent = fmt(data.stats?.wonValue);
  document.getElementById('s-count').textContent = data.stats?.count || 0;

  const pipeline = data.pipeline || {};
  const kanban = document.getElementById('kanban');
  kanban.innerHTML = stages.map(s => {
    const deals = pipeline[s.key] || [];
    const total = deals.reduce((sum, d) => sum + (d.value || 0), 0);
    return `
      <div class="kanban-col stage-${s.key}">
        <div class="kanban-header">
          <div class="kanban-title"><span class="material-symbols-outlined">${s.icon}</span> ${s.label}</div>
          <div class="kanban-count">${deals.length} · ${fmt(total)}</div>
        </div>
        <div class="kanban-cards" data-stage="${s.key}"
          ondragover="event.preventDefault();this.classList.add('drag-over')"
          ondragleave="this.classList.remove('drag-over')"
          ondrop="handleDrop(event,'${s.key}');this.classList.remove('drag-over')">
          ${deals.map(d => `
            <div class="deal-card" draggable="true" data-id="${d._id}"
              ondragstart="draggedDealId='${d._id}';this.classList.add('dragging')"
              ondragend="this.classList.remove('dragging')"
              onclick="openEditDeal('${d._id}')">
              <div class="deal-name">${esc(d.title)}</div>
              <div class="deal-company">${esc(d.contact?.company||d.contact?.name||'')}</div>
              <div><span class="deal-value">${fmt(d.value)}</span><span class="deal-prob">${d.probability}%</span></div>
            </div>
          `).join('')}
        </div>
      </div>
    `;
  }).join('');
}

async function handleDrop(e, newStage) {
  e.preventDefault();
  if (!draggedDealId) return;
  await fetch(`/api/deals/${draggedDealId}/stage`, {
    method: 'PATCH', headers,
    body: JSON.stringify({ stage: newStage })
  });
  draggedDealId = null;
  loadPipeline();
}

function openCreateDeal(){
  editingId=null;
  document.getElementById('modal-title').textContent='Nouveau deal';
  document.getElementById('del-btn').style.display='none';
  ['f-title','f-contactName','f-contactEmail','f-contactCompany','f-contactPhone','f-service','f-source','f-notes'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('f-value').value=0;
  document.getElementById('f-stage').value='lead';
  document.getElementById('f-closeDate').value='';
  document.getElementById('modal').classList.add('show');
}

function openEditDeal(id){
  const d=allDeals.find(x=>x._id===id);if(!d)return;
  editingId=id;
  document.getElementById('modal-title').textContent='Modifier: '+d.title;
  document.getElementById('del-btn').style.display='inline-block';
  document.getElementById('f-title').value=d.title||'';
  document.getElementById('f-contactName').value=d.contact?.name||'';
  document.getElementById('f-contactEmail').value=d.contact?.email||'';
  document.getElementById('f-contactCompany').value=d.contact?.company||'';
  document.getElementById('f-contactPhone').value=d.contact?.phone||'';
  document.getElementById('f-value').value=d.value||0;
  document.getElementById('f-stage').value=d.stage||'lead';
  document.getElementById('f-service').value=d.service||'';
  document.getElementById('f-source').value=d.source||'';
  document.getElementById('f-closeDate').value=d.expectedCloseDate?d.expectedCloseDate.split('T')[0]:'';
  document.getElementById('f-notes').value=d.notes||'';
  document.getElementById('modal').classList.add('show');
}

function closeModal(){document.getElementById('modal').classList.remove('show');}

async function saveDeal(){
  const body={
    title:document.getElementById('f-title').value.trim(),
    contact:{name:document.getElementById('f-contactName').value,email:document.getElementById('f-contactEmail').value,company:document.getElementById('f-contactCompany').value,phone:document.getElementById('f-contactPhone').value},
    value:parseFloat(document.getElementById('f-value').value)||0,
    stage:document.getElementById('f-stage').value,
    service:document.getElementById('f-service').value,
    source:document.getElementById('f-source').value,
    expectedCloseDate:document.getElementById('f-closeDate').value||undefined,
    notes:document.getElementById('f-notes').value
  };
  if(!body.title)return toast('Titre requis','error');
  const url=editingId?'/api/deals/'+editingId:'/api/deals';
  await fetch(url,{method:editingId?'PUT':'POST',headers,body:JSON.stringify(body)});
  toast('Sauvegardé');closeModal();loadPipeline();
}

async function deleteDeal(){
  if(!editingId||!confirm('Supprimer ce deal ?'))return;
  await fetch('/api/deals/'+editingId,{method:'DELETE',headers});
  toast('Supprimé');closeModal();loadPipeline();
}

loadPipeline();
</script>
</body>
</html>
