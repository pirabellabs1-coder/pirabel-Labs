<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carrières — Pirabel Labs</title>
<meta name="description" content="Rejoignez Pirabel Labs, agence marketing digital. Découvrez nos offres d'emploi en CDI, freelance, stage et alternance.">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">
<style>
:root{--accent:#FF5500;--bg:#0a0a0a;--card:#141414;--border:#2a2a2a;--text:#e5e2e1;--muted:#888;--font-h:'Space Grotesk',sans-serif;--font-b:'Inter',sans-serif;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:var(--font-b);line-height:1.6;}
.nav{position:fixed;top:0;left:0;right:0;background:rgba(10,10,10,.85);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);z-index:100;padding:1rem 2rem;display:flex;justify-content:space-between;align-items:center;}
.logo{font-family:var(--font-h);font-weight:700;font-size:1.25rem;color:var(--accent);text-decoration:none;letter-spacing:-.5px;}
.nav-links{display:flex;gap:2rem;}
.nav-links a{color:var(--text);text-decoration:none;font-size:.85rem;transition:color .2s;}
.nav-links a:hover{color:var(--accent);}
.hero{padding:10rem 2rem 5rem;text-align:center;max-width:900px;margin:0 auto;}
.hero h1{font-family:var(--font-h);font-size:clamp(2.5rem,6vw,4.5rem);font-weight:700;line-height:1.05;letter-spacing:-2px;margin-bottom:1.5rem;}
.hero h1 span{color:var(--accent);}
.hero p{font-size:1.15rem;color:var(--muted);max-width:600px;margin:0 auto;}
.jobs{max-width:1100px;margin:0 auto;padding:0 2rem 6rem;display:grid;grid-template-columns:repeat(auto-fill,minmax(330px,1fr));gap:1.5rem;}
.job{background:var(--card);border:1px solid var(--border);padding:2rem;transition:border-color .3s,transform .3s;text-decoration:none;color:var(--text);display:flex;flex-direction:column;}
.job:hover{border-color:var(--accent);transform:translateY(-4px);}
.job-type{display:inline-block;background:rgba(255,85,0,.1);color:var(--accent);padding:.3rem .7rem;font-size:.65rem;text-transform:uppercase;letter-spacing:.08em;font-weight:700;margin-bottom:1rem;align-self:flex-start;}
.job h3{font-family:var(--font-h);font-size:1.25rem;font-weight:700;margin-bottom:.5rem;}
.job-meta{font-size:.8rem;color:var(--muted);margin-bottom:1rem;}
.job-desc{font-size:.85rem;color:var(--muted);margin-bottom:1.5rem;flex:1;}
.job-cta{display:inline-flex;align-items:center;gap:.5rem;color:var(--accent);font-weight:600;font-size:.85rem;text-transform:uppercase;letter-spacing:.06em;}
.empty{grid-column:1/-1;text-align:center;padding:5rem 2rem;color:var(--muted);}
.footer{padding:3rem 2rem;border-top:1px solid var(--border);text-align:center;color:var(--muted);font-size:.85rem;}
</style>
</head>
<body>
<nav class="nav">
  <a href="/" class="logo">PIRABEL LABS</a>
  <div class="nav-links">
    <a href="/services.html">Services</a>
    <a href="/blog.html">Blog</a>
    <a href="/carrieres.html">Carrières</a>
    <a href="/contact.html">Contact</a>
  </div>
</nav>

<section class="hero">
  <h1>Rejoignez <span>Pirabel Labs</span></h1>
  <p>Construisons ensemble l'agence marketing digital de demain. Talents passionnés, projets ambitieux, équipe bienveillante.</p>
</section>

<section class="jobs" id="jobs-list">
  <div class="empty">Chargement des offres...</div>
</section>

<footer class="footer">
  <p>© 2026 Pirabel Labs. Tous droits réservés.</p>
</footer>

<script>
fetch('/api/recruitment/jobs/public')
  .then(r => r.json())
  .then(data => {
    const list = document.getElementById('jobs-list');
    if (!data.jobs || !data.jobs.length) {
      list.innerHTML = '<div class="empty"><h2 style="font-family:var(--font-h);margin-bottom:1rem;">Aucune offre ouverte pour le moment</h2><p>Envoyez-nous une candidature spontanée à <a href="mailto:contact@pirabellabs.com" style="color:var(--accent);">contact@pirabellabs.com</a></p></div>';
      return;
    }
    list.innerHTML = data.jobs.map(j => `
      <a href="/candidature.html?slug=${j.slug}" class="job">
        <span class="job-type">${escapeHtml(j.type)}</span>
        <h3>${escapeHtml(j.title)}</h3>
        <div class="job-meta">${escapeHtml(j.department || '')} ${j.location ? '· ' + escapeHtml(j.location) : ''} ${j.salary ? '· ' + escapeHtml(j.salary) : ''}</div>
        <div class="job-desc">${escapeHtml((j.description || '').slice(0, 140))}${(j.description || '').length > 140 ? '...' : ''}</div>
        <div class="job-cta">Postuler <span class="material-symbols-outlined" style="font-size:1rem;">arrow_forward</span></div>
      </a>
    `).join('');
  })
  .catch(() => {
    document.getElementById('jobs-list').innerHTML = '<div class="empty">Erreur de chargement. Réessayez plus tard.</div>';
  });

function escapeHtml(s) { return (s || '').toString().replace(/[&<>"']/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[m])); }
</script>
</body>
</html>
