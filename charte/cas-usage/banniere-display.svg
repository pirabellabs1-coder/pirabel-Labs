<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 270" font-family="Space Grotesk, sans-serif">
  <defs>
    <style>@import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@800&amp;family=Space+Grotesk:wght@500;700&amp;display=swap');</style>
  </defs>
  <title>Pirabel Labs — bannières display (300 × 250 et 728 × 90)</title>

  <text x="0" y="14" fill="#888780" font-size="11">Medium Rectangle · 300 × 250</text>
  <g transform="translate(0,22)">
    <rect width="300" height="250" rx="8" fill="#0E0E0E"/>
    <image href="../brand/assets/logo/pirabel-mark.svg" x="20" y="20" width="44" height="44"/>
    <text x="72" y="40" font-family="Montserrat, sans-serif" font-weight="800" font-size="16" fill="#F5F4F1">PIRABEL <tspan fill="#FF5500">LABS</tspan></text>
    <text x="72" y="56" font-size="9" letter-spacing="2" fill="rgba(229,226,225,0.5)">STUDIO TECH PREMIUM</text>
    <text x="20" y="120" font-family="Montserrat, sans-serif" font-weight="800" font-size="30" fill="#F5F4F1">Un site qui</text>
    <text x="20" y="152" font-family="Montserrat, sans-serif" font-weight="800" font-size="30" fill="#FF5500">convertit.</text>
    <text x="20" y="182" font-size="13" font-weight="500" fill="rgba(229,226,225,0.7)">Design + SEO + résultats.</text>
    <rect x="20" y="200" width="170" height="40" rx="20" fill="#FF5500"/>
