    <text x="76" y="64" font-size="12" font-weight="500" fill="rgba(229,226,225,0.65)">Pirabel Labs — studio tech premium.</text>
    <rect x="288" y="27" width="118" height="36" rx="18" fill="#FF5500"/>
    <text x="347" y="50" text-anchor="middle" font-weight="700" font-size="13" fill="#0E0E0E">Devis gratuit</text>
