<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#141313;color:#e5e2e1;font-family:sans-serif;height:100vh;display:flex;align-items:center;justify-content:center;}
.box{width:100%;max-width:400px;padding:2rem;text-align:center;}
input{width:100%;padding:1rem;margin:1rem 0;background:#000;border:1px solid #333;color:#fff;}
button{width:100%;padding:1rem;background:#FF5500;border:none;color:#000;font-weight:700;cursor:pointer;}
</style>
<!-- Microsoft Clarity -->
<script type="text/javascript">
    (function(c,l,a,r,i,t,y){
        c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};
        t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;
        y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);
    })(window, document, "clarity", "script", "w6joqzqtx3");
</script>
</head>
<body>
<div class="box">
  <h2>Espace Client Sécurisé</h2>
  <form id="portalForm">
    <input type="email" id="email" placeholder="Email" required>
    <input type="password" id="password" placeholder="Mot de Passe" required>
    <button type="submit">Se Connecter</button>
  </form>
</div>
<script>
document.getElementById('portalForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;
  const res = await fetch('/api/auth/login', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ email, password })
  });
  const data = await res.json();
  if (data.success) {
    localStorage.setItem('token', data.token);
    window.location.href = '/portal';
  } else { alert(data.error || 'Erreur'); }
});
</script>
</body>
</html>
