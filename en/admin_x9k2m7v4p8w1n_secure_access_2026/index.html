<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--bg:#141313;--surface:#1c1b1b;--card:#0e0e0e;--accent:#FF5500;--text:#e5e2e1;--muted:rgba(229,226,225,0.5);--border:rgba(92,64,55,0.15);}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden;}
.noise{position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");opacity:0.05;pointer-events:none;z-index:1000;}
.login-box{width:100%;max-width:420px;padding:3rem;position:relative;z-index:10;}
.logo{font-family:'Space Grotesk';font-size:1.75rem;font-weight:700;color:var(--accent);text-align:center;margin-bottom:0.5rem;}
.subtitle{text-align:center;color:var(--muted);font-size:0.875rem;margin-bottom:3rem;}
.form-group{margin-bottom:1.5rem;}
.form-label{display:block;font-size:0.6875rem;font-weight:700;text-transform:uppercase;color:var(--muted);margin-bottom:0.5rem;}
.form-input{width:100%;background:var(--card);border:1px solid var(--border);padding:0.875rem 1rem;color:var(--text);outline:none;}
.btn-login{width:100%;background:var(--accent);color:#5c1900;font-weight:700;padding:1rem;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:0.5rem;}
.error-msg{background:rgba(255,180,171,0.1);border:1px solid rgba(255,180,171,0.3);color:#ffb4ab;padding:0.75rem;font-size:0.8125rem;margin-bottom:1.5rem;display:none;text-align:center;}
</style>

<style>
.lang-switch{position:fixed;bottom:1.5rem;right:1.5rem;z-index:9999;display:flex;gap:0;border:1px solid rgba(255,85,0,.4);background:rgba(10,10,10,.9);backdrop-filter:blur(10px);font-family:'Space Grotesk',sans-serif;}
.lang-switch a{padding:.5rem .85rem;font-size:.7rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;text-decoration:none;color:rgba(255,255,255,.5);transition:all .2s;}
.lang-switch a:hover{color:#fff;}
.lang-switch a.active{background:#FF5500;color:#fff;}
</style>
</head>
<body>
<div class="noise"></div>
<div class="login-box">
 <div class="logo">PIRABEL LABS</div>
 <p class="subtitle">Connexion Sécurisée Administration</p>
 <div id="error" class="error-msg"></div>
 <form id="loginForm">
  <div class="form-group"><label class="form-label">Email</label><input type="email" class="form-input" id="email" required></div>
  <div class="form-group"><label class="form-label">Mot de passe</label><input type="password" class="form-input" id="password" required></div>
  <button type="submit" class="btn-login">Accéder au Dashboard</button>
 </form>
</div>
<script>
document.getElementById('loginForm').addEventListener('submit', async (e) => {
 e.preventDefault();
 const email = document.getElementById('email').value;
 const password = document.getElementById('password').value;
 try {
  const res = await fetch('/api/auth/login', {
   method: 'POST',
   headers: { 'Content-Type': 'application/json' },
   body: JSON.stringify({ email, password })
  });
  const data = await res.json();
  if (data.success) {
   localStorage.setItem('token', data.token);
   window.location.href = '/dashboard';
  } else {
   document.getElementById('error').textContent = data.error || 'Error';
   document.getElementById('error').style.display = 'block';
  }
 } catch (err) { }
});
</script>

<div class="lang-switch"><a href="/admin_x9k2m7v4p8w1n_secure_access_2026">FR</a><a href="#" class="active">EN</a></div>
</body>
