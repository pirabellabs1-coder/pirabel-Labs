<title>Espace Client | Pirabel Labs</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--bg:#141313;--surface:#1c1b1b;--card:#0e0e0e;--accent:#FF5500;--text:#e5e2e1;--muted:rgba(229,226,225,0.5);--border:rgba(92,64,55,0.15);}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden;}
.noise{position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");opacity:0.05;pointer-events:none;z-index:1000;}
.orb{position:fixed;border-radius:50%;filter:blur(120px);pointer-events:none;}
.orb-1{width:500px;height:500px;background:rgba(0,199,165,0.06);top:-100px;right:-100px;}
.orb-2{width:400px;height:400px;background:rgba(255,87,8,0.05);bottom:-100px;left:-100px;}
.login-box{width:100%;max-width:420px;padding:3rem;position:relative;z-index:10;}
.logo{font-family:'Space Grotesk';font-size:1.75rem;font-weight:700;color:var(--accent);text-align:center;margin-bottom:0.25rem;letter-spacing:-0.03em;}
.subtitle{text-align:center;color:var(--muted);font-size:0.875rem;margin-bottom:0.5rem;}
.client-badge{text-align:center;margin-bottom:2.5rem;}
.client-badge span{display:inline-block;padding:0.3rem 1rem;border:1px solid rgba(0,199,165,0.3);color:#41e4c0;font-family:'Space Grotesk';font-size:0.6875rem;font-weight:700;text-transform:uppercase;letter-spacing:0.15em;}
.form-group{margin-bottom:1.5rem;}
.form-label{display:block;font-family:'Space Grotesk';font-size:0.6875rem;font-weight:700;text-transform:uppercase;letter-spacing:0.15em;color:var(--muted);margin-bottom:0.5rem;}
.form-input{width:100%;background:var(--card);border:1px solid var(--border);padding:0.875rem 1rem;color:var(--text);font-size:1rem;font-family:'Inter';outline:none;transition:border-color 0.3s;}
.form-input:focus{border-color:#41e4c0;}
.form-input::placeholder{color:rgba(229,226,225,0.2);}
.btn-login{width:100%;background:#41e4c0;color:#00382d;font-family:'Space Grotesk';font-weight:700;font-size:0.9375rem;text-transform:uppercase;letter-spacing:0.05em;padding:1rem;border:none;cursor:pointer;transition:transform 0.3s,box-shadow 0.3s;display:flex;align-items:center;justify-content:center;gap:0.5rem;}
.btn-login:hover{transform:scale(1.02);box-shadow:0 0 30px rgba(65,228,192,0.3);}
.error-msg{background:rgba(255,180,171,0.1);border:1px solid rgba(255,180,171,0.3);color:#ffb4ab;padding:0.75rem;font-size:0.8125rem;margin-bottom:1.5rem;display:none;text-align:center;}
.back-link{display:block;text-align:center;color:var(--muted);font-size:0.8125rem;text-decoration:none;margin-top:2rem;transition:color 0.3s;}
.back-link:hover{color:#41e4c0;}
</style>

    <meta property="og:title" content="Espace Client | Pirabel Labs">
    <meta property="og:description" content="Espace Client | Pirabel Labs | Pirabel Labs - Agence marketing digital">

<script async src="https://www.googletagmanager.com/gtag/js?id=G-H0ZTTRYBQ7"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-H0ZTTRYBQ7');
</script>
</head>
<body>
<div class="noise"></div>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>

<div class="login-box">
  <div class="logo">PIRABEL LABS</div>
  <p class="subtitle">Espace Client</p>
  <div class="client-badge"><span>Portail S&eacute;curis&eacute;</span></div>

  <div id="error" class="error-msg"></div>

  <form id="loginForm">
    <div class="form-group">
      <label class="form-label">Email</label>
      <input type="email" class="form-input" id="email" placeholder="votre@email.com" required>
    </div>
    <div class="form-group">
      <label class="form-label">Mot de passe</label>
      <input type="password" class="form-input" id="password" placeholder="Votre mot de passe" required>
    </div>
    <button type="submit" class="btn-login">
      Acc&eacute;der &agrave; mon espace <span class="material-symbols-outlined" style="font-size:1.125rem;">arrow_forward</span>
    </button>
  </form>

  <p style="text-align:center;color:var(--muted);font-size:0.75rem;margin-top:1.5rem;">Vos identifiants vous ont &eacute;t&eacute; communiqu&eacute;s par votre chef de projet.</p>
  <a href="/" class="back-link">&larr; Retour au site</a>
</div>

<script>
document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;
  const errorEl = document.getElementById('error');
  errorEl.style.display = 'none';

  try {
    const res = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });
    const data = await res.json();

    if (data.success) {
      localStorage.setItem('user', JSON.stringify(data.user));
      localStorage.setItem('token', data.token);
      window.location.href = '/portal';
    } else {
      errorEl.textContent = data.error || 'Identifiants incorrects';
      errorEl.style.display = 'block';
    }
  } catch (err) {
    errorEl.textContent = 'Erreur de connexion au serveur';
    errorEl.style.display = 'block';
  }
});
</script>
</body>
</html>
