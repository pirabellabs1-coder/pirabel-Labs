<main class="cert-wrap">
<h1 class="cert-h1">Votre certificat</h1>
<p class="cert-subtitle">Shopify pour Marchands Débutants : Lancez Votre E-commerce</p>

<div id="cert-status-box" class="cert-status">Verification de votre progression...</div>

<div id="cert-preview-wrap"></div>

<script>
const FORMATION_SLUG = "shopify-marchand-debutant";
const FORMATION_TITLE = 'Shopify pour Marchands Débutants : Lancez Votre E-commerce';
const N_MODULES = 5;
const N_LESSONS = 26;
const LANG = "fr";

(async () => {
  const box = document.getElementById('cert-status-box');
  const wrap = document.getElementById('cert-preview-wrap');
  try {
    const r = await fetch('/api/lms/certificate-data?formation=' + encodeURIComponent(FORMATION_SLUG), { credentials: 'include' });
    if (!r.ok) {
      if (r.status === 401) {
        box.className = 'cert-status locked';
        box.innerHTML = `<strong>Connexion requise.</strong> Connectez-vous pour acceder a votre certificat. <a href="/espace-client-4p8w1n" style="color:var(--primary-container);">Se connecter &rarr;</a>`;
        return;
      }
      throw new Error('fail');
    }
    const data = await r.json();
    if (!data.eligible) {
      box.className = 'cert-status locked';
      box.innerHTML = `<strong>Certificat pas encore accessible.</strong><br>Progression : ${data.lessonsCompleted} / ${N_LESSONS} lecons terminees, ${data.modulesPassed} / ${N_MODULES} quiz valides.<br><a href="/formations/shopify-marchand-debutant/m1-l1" style="color:var(--primary-container);">Reprendre la formation &rarr;</a>`;
      return;
    }
    box.className = 'cert-status unlocked';
    box.innerHTML = `<strong>Certificat debloque.</strong> Cliquez sur le bouton ci-dessous pour imprimer ou sauvegarder en PDF (utilisez la fonction d'impression de votre navigateur et selectionnez Enregistrer au format PDF).<br><a href="javascript:window.print()" class="cert-download">Imprimer / Enregistrer en PDF</a>`;
    const issued = new Date(data.issuedAt || Date.now()).toLocaleDateString(LANG, { year: 'numeric', month: 'long', day: 'numeric' });
    const certNum = (data.certificateId || 'PL-' + FORMATION_SLUG.toUpperCase()).slice(0, 32);
    wrap.innerHTML = `
<div class="cert-preview">
<div class="cert-ribbon">Pirabel Labs Academy</div>
<h2>Certificat de Reussite</h2>
<p>Decerne a</p>
<div class="cert-name">${data.studentName || (LANG === 'en' ? 'Student' : 'Etudiant')}</div>
<p class="cert-formation">Pour avoir suivi avec succes la formation<br><strong>${FORMATION_TITLE}</strong></p>
<div class="cert-stats">
<div>${N_MODULES} modules</div>
<div>${N_LESSONS} lecons</div>
<div>Emis le : ${issued}</div>
</div>
<div class="cert-sig">
<div class="sig-block"><strong>Lissanon Gildas</strong><br>Cofondateur Pirabel Labs</div>
<div class="sig-block"><strong>Fidah Imorou</strong><br>Cofondateur Pirabel Labs</div>
</div>
<p style="margin-top:2rem;font-size:0.7rem;color:#999;">ID certificat : ${certNum}<br>Verifier sur pirabellabs.com/verify/${certNum}</p>
</div>`;
  } catch (e) {
    box.className = 'cert-status locked';
    box.textContent = "Erreur de chargement.";
  }
})();
</script>
