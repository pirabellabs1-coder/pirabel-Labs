<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prendre rendez-vous — Pirabel Labs</title>
<meta name="description" content="Réservez un créneau gratuit avec un consultant Pirabel Labs pour discuter de votre projet digital.">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">
<style>
:root{--accent:#FF5500;--bg:#0a0a0a;--card:#141414;--border:#2a2a2a;--text:#e5e2e1;--muted:#888;--font-h:'Space Grotesk',sans-serif;--font-b:'Inter',sans-serif;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:var(--font-b);line-height:1.6;}
.nav{position:fixed;top:0;left:0;right:0;background:rgba(10,10,10,.85);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);z-index:100;padding:1rem 2rem;display:flex;justify-content:space-between;align-items:center;}
.logo{font-family:var(--font-h);font-weight:700;font-size:1.25rem;color:var(--accent);text-decoration:none;}
.nav-links a{color:var(--text);text-decoration:none;font-size:.85rem;margin-left:2rem;}
.hero{padding:8rem 2rem 3rem;text-align:center;max-width:800px;margin:0 auto;}
.hero h1{font-family:var(--font-h);font-size:clamp(2rem,5vw,3.5rem);font-weight:700;line-height:1.1;letter-spacing:-1px;margin-bottom:1rem;}
.hero h1 span{color:var(--accent);}
.hero p{color:var(--muted);font-size:1.05rem;}
.booking{max-width:1100px;margin:0 auto;padding:0 2rem 6rem;display:grid;grid-template-columns:1fr 1.2fr;gap:2rem;}
@media(max-width:900px){.booking{grid-template-columns:1fr;}}
.calendar-side{background:var(--card);border:1px solid var(--border);padding:2rem;}
.cal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem;}
.cal-head h2{font-family:var(--font-h);font-size:1.1rem;text-transform:capitalize;}
.cal-head button{background:transparent;border:1px solid var(--border);color:var(--text);width:32px;height:32px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.cal-head button:hover{border-color:var(--accent);color:var(--accent);}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:.25rem;}
.cal-dh{font-size:.65rem;color:var(--muted);text-align:center;padding:.5rem 0;text-transform:uppercase;letter-spacing:.05em;}
.cal-d{aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:.85rem;cursor:pointer;border:1px solid transparent;transition:all .15s;}
.cal-d:hover:not(.disabled){background:rgba(255,85,0,.1);border-color:var(--accent);}
.cal-d.disabled{color:#444;cursor:not-allowed;}
.cal-d.selected{background:var(--accent);color:#000;font-weight:700;}
.cal-d.today{border-color:var(--accent);}
.slots{margin-top:1.5rem;}
.slots h3{font-size:.7rem;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:.75rem;}
.slot-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:.5rem;}
.slot{background:var(--bg);border:1px solid var(--border);padding:.6rem;text-align:center;font-size:.8rem;cursor:pointer;transition:all .15s;}
.slot:hover{border-color:var(--accent);color:var(--accent);}
.slot.selected{background:var(--accent);color:#000;border-color:var(--accent);font-weight:700;}
.no-slot{grid-column:1/-1;text-align:center;padding:1rem;color:var(--muted);font-size:.85rem;}
.form-side{background:var(--card);border:1px solid var(--border);padding:2rem;}
.form-side h2{font-family:var(--font-h);font-size:1.4rem;margin-bottom:1.5rem;}
.summary{background:var(--bg);border:1px solid var(--border);padding:1rem;margin-bottom:1.5rem;font-size:.85rem;}
.summary strong{color:var(--accent);}
.field{margin-bottom:1rem;}
.field label{display:block;font-size:.7rem;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:.4rem;font-weight:700;}
.field input,.field textarea,.field select{width:100%;background:var(--bg);border:1px solid var(--border);padding:.75rem 1rem;color:var(--text);font-size:.9rem;font-family:inherit;outline:none;}
.field input:focus,.field textarea:focus,.field select:focus{border-color:var(--accent);}
.field textarea{min-height:80px;resize:vertical;}
.btn{background:var(--accent);color:#5c1900;border:none;padding:1rem 2rem;font-weight:700;font-size:.85rem;text-transform:uppercase;letter-spacing:.08em;cursor:pointer;width:100%;font-family:inherit;}
.btn:hover{background:#ff6a1a;}
.btn:disabled{opacity:.5;cursor:not-allowed;background:var(--border);}
.alert{padding:1rem;margin-bottom:1rem;font-size:.85rem;}
.alert-success{background:rgba(46,204,113,.1);color:#2ecc71;border:1px solid rgba(46,204,113,.3);}
.alert-error{background:rgba(231,76,60,.1);color:#e74c3c;border:1px solid rgba(231,76,60,.3);}
.honeypot{position:absolute;left:-9999px;}
</style>

<style>
.lang-switch{position:fixed;bottom:1.5rem;right:1.5rem;z-index:9999;display:flex;gap:0;border:1px solid rgba(255,85,0,.4);background:rgba(10,10,10,.9);backdrop-filter:blur(10px);font-family:'Space Grotesk',sans-serif;}
.lang-switch a{padding:.5rem .85rem;font-size:.7rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;text-decoration:none;color:rgba(255,255,255,.5);transition:all .2s;}
.lang-switch a:hover{color:#fff;}
.lang-switch a.active{background:#FF5500;color:#fff;}
</style>
</head>
<body>
<nav class="nav">
  <a href="/" class="logo">PIRABEL LABS</a>
  <div class="nav-links">
    <a href="/services.html">Services</a>
    <a href="/contact.html">Contact</a>
  </div>
</nav>

<section class="hero">
  <h1>Réservez un <span>rendez-vous</span></h1>
  <p>Discutons de votre projet en 30 minutes. C'est gratuit et sans engagement.</p>
</section>

<section class="booking">
  <div class="calendar-side">
    <div class="cal-head">
      <button onclick="prevMonth()"><span class="material-symbols-outlined">chevron_left</span></button>
      <h2 id="cal-month"></h2>
      <button onclick="nextMonth()"><span class="material-symbols-outlined">chevron_right</span></button>
    </div>
    <div class="cal-grid" id="cal-grid"></div>
    <div class="slots">
      <h3 id="slots-title">Sélectionnez une date</h3>
      <div class="slot-grid" id="slots-grid"></div>
    </div>
  </div>

  <div class="form-side">
    <h2>Vos coordonnées</h2>
    <div id="alert"></div>
    <div class="summary" id="summary" style="display:none;">
      RDV sélectionné : <strong id="summary-text"></strong>
    </div>
    <form id="form" onsubmit="submitBooking(event)">
      <input type="text" name="website_url" class="honeypot" tabindex="-1" autocomplete="off">
      <div class="field"><label>Type de RDV</label>
        <select name="type">
          <option value="consultation">Consultation découverte</option>
          <option value="demo">Démo de nos services</option>
          <option value="kickoff">Kick-off projet</option>
          <option value="autre">Autre</option>
        </select>
      </div>
      <div class="field"><label>Prénom & Nom *</label><input type="text" name="name" required></div>
      <div class="field"><label>Email *</label><input type="email" name="email" required></div>
      <div class="field"><label>Téléphone</label><input type="tel" name="phone"></div>
      <div class="field"><label>Entreprise</label><input type="text" name="company"></div>
      <div class="field"><label>Sujet du RDV</label><textarea name="notes" placeholder="Parlez-nous de votre projet..."></textarea></div>
      <button type="submit" class="btn" id="submit-btn" disabled>Sélectionnez d'abord un créneau</button>
    </form>
  </div>
</section>

<script>
let currentDate = new Date();
let selectedDate = null;
let selectedSlot = null;

function escapeHtml(s) { return (s || '').toString().replace(/[&<>"']/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[m])); }

function renderCalendar() {
  document.getElementById('cal-month').textContent = currentDate.toLocaleDateString('fr-FR', { month: 'long', year: 'numeric' });
  const grid = document.getElementById('cal-grid');
  const headers = ['L', 'M', 'M', 'J', 'V', 'S', 'D'];
  let html = headers.map(h => `<div class="cal-dh">${h}</div>`).join('');

  const firstDay = new Date(currentDate.getFullYear(), currentDate.getMonth(), 1);
  const lastDay = new Date(currentDate.getFullYear(), currentDate.getMonth() + 1, 0);
  let offset = firstDay.getDay() - 1;
  if (offset < 0) offset = 6;
  for (let i = 0; i < offset; i++) html += '<div></div>';

  const today = new Date();
  today.setHours(0, 0, 0, 0);

  for (let day = 1; day <= lastDay.getDate(); day++) {
    const d = new Date(currentDate.getFullYear(), currentDate.getMonth(), day);
    const isPast = d < today;
    const isWeekend = d.getDay() === 0 || d.getDay() === 6;
    const disabled = isPast || isWeekend;
    const isToday = d.getTime() === today.getTime();
    const isSelected = selectedDate && d.toDateString() === selectedDate.toDateString();
    const cls = ['cal-d'];
    if (disabled) cls.push('disabled');
    if (isToday) cls.push('today');
    if (isSelected) cls.push('selected');
    html += `<div class="${cls.join(' ')}" ${disabled ? '' : `onclick="selectDate(${day})"`}>${day}</div>`;
  }
  grid.innerHTML = html;
}

function prevMonth() {
  const newDate = new Date(currentDate.getFullYear(), currentDate.getMonth() - 1, 1);
  const today = new Date(); today.setDate(1); today.setHours(0, 0, 0, 0);
  if (newDate < today) return;
  currentDate = newDate;
  renderCalendar();
}

function nextMonth() {
  currentDate = new Date(currentDate.getFullYear(), currentDate.getMonth() + 1, 1);
  renderCalendar();
}

async function selectDate(day) {
  selectedDate = new Date(currentDate.getFullYear(), currentDate.getMonth(), day);
  selectedSlot = null;
  renderCalendar();
  const dateStr = selectedDate.getFullYear() + '-' + String(selectedDate.getMonth() + 1).padStart(2, '0') + '-' + String(selectedDate.getDate()).padStart(2, '0');
  document.getElementById('slots-title').textContent = 'Créneaux du ' + selectedDate.toLocaleDateString('fr-FR', { weekday: 'long', day: 'numeric', month: 'long' });
  document.getElementById('slots-grid').innerHTML = '<div class="no-slot">Chargement...</div>';

  try {
    const r = await fetch('/api/appointments/availability?date=' + dateStr);
    const data = await r.json();
    if (!data.slots || !data.slots.length) {
      document.getElementById('slots-grid').innerHTML = '<div class="no-slot">Aucun créneau disponible. Choisissez une autre date.</div>';
      return;
    }
    document.getElementById('slots-grid').innerHTML = data.slots.map(s => `<div class="slot" onclick="selectSlot('${s}')">${s}</div>`).join('');
  } catch (e) {
    document.getElementById('slots-grid').innerHTML = '<div class="no-slot">Erreur de chargement</div>';
  }
}

function selectSlot(time) {
  selectedSlot = time;
  document.querySelectorAll('.slot').forEach(s => s.classList.remove('selected'));
  event.currentTarget.classList.add('selected');
  document.getElementById('summary').style.display = 'block';
  document.getElementById('summary-text').textContent = selectedDate.toLocaleDateString('fr-FR', { weekday: 'long', day: 'numeric', month: 'long' }) + ' à ' + time;
  const btn = document.getElementById('submit-btn');
  btn.disabled = false;
  btn.textContent = 'Confirmer le rendez-vous';
}

async function submitBooking(e) {
  e.preventDefault();
  if (!selectedDate || !selectedSlot) return;
  const form = e.target;
  const data = Object.fromEntries(new FormData(form));
  const [hh, mm] = selectedSlot.split(':').map(Number);
  const dt = new Date(selectedDate);
  dt.setHours(hh, mm, 0, 0);
  data.date = dt.toISOString();
  data.title = (data.type === 'consultation' ? 'Consultation' : data.type) + ' - ' + data.name;

  const btn = document.getElementById('submit-btn');
  btn.disabled = true;
  btn.textContent = 'Envoi...';

  try {
    const r = await fetch('/api/appointments/book', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data)
    });
    const result = await r.json();
    if (result.error) {
      showAlert(result.error, 'error');
      btn.disabled = false;
      btn.textContent = 'Confirmer le rendez-vous';
    } else {
      showAlert('Rendez-vous confirmé ! Vous recevrez un email de confirmation.', 'success');
      form.reset();
      btn.textContent = 'Confirmé ✓';
      setTimeout(() => { window.scrollTo({ top: 0, behavior: 'smooth' }); }, 100);
    }
  } catch (err) {
    showAlert('Erreur réseau, réessayez', 'error');
    btn.disabled = false;
    btn.textContent = 'Confirmer le rendez-vous';
  }
}

function showAlert(msg, type) {
  document.getElementById('alert').innerHTML = '<div class="alert alert-' + type + '">' + escapeHtml(msg) + '</div>';
}

renderCalendar();
</script>

<div class="lang-switch"><a href="#" class="active">FR</a><a href="/en/rendez-vous.html">EN</a></div>
</body>
</html>
